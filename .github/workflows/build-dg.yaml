name: Build Data Grid

on:
  push:
    branches: ["main"]
    paths:
      - "**/data-grid/**"
      - "**/build-dg.yaml"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - uses: actions/checkout@v6
      - uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - uses: pnpm/action-setup@v6
        name: Install pnpm
        with:
          run_install: false
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter data-grid run build
      - name: Upload to blob storage
        uses: azure/CLI@v3
        with:
          inlineScript: |
            az storage blob upload-batch --account-name blzaidg --auth-mode login -d '$web' -s ./data-grid/dist --overwrite --output none
      - name: Purge CDN endpoint
        uses: azure/CLI@v3
        with:
          inlineScript: |
            az afd endpoint purge --resource-group blz.ai --profile-name blzai-static --endpoint-name blzai-dg --domains dg.blz.ai www.dg.blz.ai --content-paths '/*'
      # Azure logout
      - name: logout
        run: |
          az logout
        if: always()
